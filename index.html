<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2B Wholesale Application</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --text-light: #475569;
            --border: #cbd5e1;
        }
        body { font-family: system-ui, -apple-system, sans-serif; background-color: var(--bg); color: var(--text); padding: 40px 20px; display: flex; justify-content: center; }
        .form-card { background: var(--card); padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 500px; width: 100%; border: 1px solid #e2e8f0; }
        h2 { margin: 0 0 8px 0; font-size: 24px; font-weight: 700; color: var(--text); }
        .subtitle { margin: 0 0 32px 0; color: var(--text-light); font-size: 14px; }
        .group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-light); }
        input, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; font-size: 15px; color: var(--text); transition: all 0.2s; }
        input:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15); }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; font-weight: 700; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 15px; transition: background 0.2s; }
        button:hover { background: var(--primary-hover); }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="form-card">
    <h2>B2B Wholesale Application</h2>
    <p class="subtitle">Complete the verification form below to unlock trade pricing and bulk stock sheets.</p>
    
    <form id="b2bWholesaleForm">
        <!-- ⚠️ PLACE YOUR FREE ACCESS KEY FROM WEB3FORMS.COM BELOW -->
        <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY_HERE">
        
        <!-- Hidden honeypot field to block automated spambots -->
        <input type="checkbox" name="botcheck" style="display: none;">

        <div class="group">
            <label>Company Legal Name</label>
            <input type="text" name="company_name" placeholder="e.g. Acme Electronics LLC" required>
        </div>

        <div class="group">
            <label>Business Type</label>
            <select name="business_type" required>
                <option value="" disabled selected>Select your model...</option>
                <option value="Reseller">Reseller (Online / Retail)</option>
                <option value="Wholesaler">Wholesaler / Broker</option>
                <option value="Distributor">Volume Distributor</option>
                <option value="Repair Shop">Device Repair / Refurbishment</option>
                <option value="Exporter">International Exporter</option>
            </select>
        </div>

        <div class="group">
            <label>Tax ID / Resale Certificate Number</label>
            <input type="text" name="tax_resale_id" placeholder="e.g. ST-120XXXXXX" required>
        </div>

        <div class="group">
            <label>Contact Name</label>
            <input type="text" name="contact_name" placeholder="First & Last Name" required>
        </div>

        <div class="group">
            <label>Corporate Email</label>
            <input type="email" name="email" placeholder="name@yourcompany.com" required>
        </div>

        <div class="group">
            <label>Estimated Monthly Sourcing Volume</label>
            <select name="monthly_volume" required>
                <option value="" disabled selected>Select expected purchase volume...</option>
                <option value="Under $10k">Under $10,000 / mo</option>
                <option value="$10k-$50k">$10,000 - $50,000 / mo</option>
                <option value="$50k-$200k">$50,000 - $200,000 / mo</option>
                <option value="$200k+">$200,000+ / mo</option>
            </select>
        </div>

        <button type="submit" id="submitButton">Submit Application</button>
    </form>
</div>

<script>
document.getElementById('b2bWholesaleForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const submitBtn = document.getElementById('submitButton');
    submitBtn.innerText = "Verifying Application...";
    submitBtn.disabled = true;

    const formData = new FormData(this);
    const formObject = Object.fromEntries(formData);
    const jsonPayload = JSON.stringify(formObject);

    fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: jsonPayload
    })
    .then(async (response) => {
        if (response.status === 200) {
            // Success! Send your user to the standard completion confirmation page
            window.location.href = "https://web3forms.com/success"; 
        } else {
            alert("Something went wrong with the submission. Please double-check your entries.");
            submitBtn.innerText = "Submit Application";
            submitBtn.disabled = false;
        }
    })
    .catch(error => {
        console.error(error);
        alert("Network error. Please try again later.");
        submitBtn.innerText = "Submit Application";
        submitBtn.disabled = false;
    });
});
</script>

</body>
</html>
